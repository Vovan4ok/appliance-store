# ── Dev profile: H2 in-memory, fast iteration, no Docker required ──

spring.datasource.url=jdbc:h2:mem:store
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

spring.flyway.enabled=false

spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:manufacturer.sql, classpath:client.sql, classpath:employee.sql, classpath:appliance.sql, classpath:order.sql

logging.level.com.vovan4ok=DEBUG

# Mailpit local SMTP catcher - run `docker compose up mailpit`, UI at http://localhost:8025
spring.mail.host=localhost
spring.mail.port=1025