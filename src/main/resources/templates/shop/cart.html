<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{shop.cart.header}">Cart</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">
    <h1 class="h2 mb-4" th:text="#{shop.cart.header}">Shopping Cart</h1>

    <div th:if="${order == null or order.orderRowSet.empty}" class="text-center py-5">
        <i class="bi bi-cart-x display-1 text-muted"></i>
        <p class="text-muted mt-3 fs-5" th:text="#{shop.cart.empty}">Your cart is empty</p>
        <a th:href="@{/shop}" class="btn btn-primary mt-2">
            <i class="bi bi-arrow-left me-1"></i>
            <span th:text="#{shop.cart.back}">Continue Shopping</span>
        </a>
    </div>

    <div th:unless="${order == null or order.orderRowSet.empty}">
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th th:text="#{shop.cart.item.appliance}">Appliance</th>
                        <th class="text-end d-none d-md-table-cell" th:text="#{shop.cart.item.price}">Unit Price</th>
                        <th class="text-center" th:text="#{shop.cart.item.qty}">Qty</th>
                        <th class="text-end" th:text="#{object.appliance.price}">Total</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${order.orderRowSet}">
                        <td>
                            <span class="fw-semibold" th:text="${row.appliance.name}"></span>
                            <small class="text-muted d-block"
                                   th:text="${row.appliance.manufacturer.getName()}"></small>
                        </td>
                        <td class="text-end text-muted d-none d-md-table-cell">
                            <span th:text="${row.amount}"></span> UAH
                        </td>
                        <td class="text-center" style="min-width: 130px;">
                            <form th:action="@{/shop/cart/rows/__${row.id}__/update}"
                                  method="post"
                                  class="d-flex align-items-center gap-1 justify-content-center">
                                <input type="number" name="number" th:value="${row.number}"
                                       min="1" max="999"
                                       class="form-control form-control-sm text-center"
                                       style="width: 70px;">
                                <button type="submit" class="btn btn-sm btn-outline-secondary"
                                        th:title="#{btn.save}">
                                    <i class="bi bi-check2"></i>
                                </button>
                            </form>
                        </td>
                        <td class="text-end fw-bold text-primary">
                            <span th:text="${row.amount.multiply(T(java.math.BigDecimal).valueOf(row.number))}"></span> UAH
                        </td>
                        <td class="text-end">
                            <form th:action="@{/shop/cart/rows/__${row.id}__/remove}"
                                  method="post"
                                  onsubmit="return confirm('Remove this item from cart?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        th:title="#{order.row.remove}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                    <tfoot>
                    <tr class="table-secondary">
                        <td colspan="3" class="fw-bold text-end" th:text="#{shop.cart.total}">Total</td>
                        <td class="fw-bold text-end fs-5 text-primary">
                            <span th:text="${order.amount}"></span> UAH
                        </td>
                        <td></td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="d-flex gap-2 justify-content-between mt-3">
            <a th:href="@{/shop}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>
                <span th:text="#{shop.cart.back}">Continue Shopping</span>
            </a>
            <form th:action="@{/shop/checkout}" method="post">
                <input type="hidden" name="orderId" th:value="${order.id}">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="bi bi-check2-circle me-1"></i>
                    <span th:text="#{shop.cart.proceed}">Proceed to Order</span>
                </button>
            </form>
        </div>
    </div>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
