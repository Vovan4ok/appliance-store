<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{error.header}">Error</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="text-center">
        <div class="display-1 fw-bold text-danger mb-2" th:text="${status}">500</div>
        <h2 class="mb-3" th:text="${error}">An error occurred</h2>
        <p class="text-muted mb-2"
           th:if="${message != null and !#strings.isEmpty(message)}"
           th:text="${message}"></p>
        <p class="text-muted small mb-4" th:if="${path != null}">
            <span th:text="#{error.path}">Path</span>: <code th:text="${path}"></code>
        </p>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="bi bi-house-door me-1"></i>
            <span th:text="#{error.back.home}">Back to Home</span>
        </a>
    </div>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
