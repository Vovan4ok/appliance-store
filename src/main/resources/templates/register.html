<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{register.header}">Create Account</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill display-3 text-primary"></i>
            <h1 class="h3 mt-2 fw-bold" th:text="#{register.header}">Create Account</h1>
        </div>

        <div th:if="${emailError}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="#{register.email.taken}">This email address is already registered.</span>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form th:action="@{/register}" th:object="${client}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{object.user.name}">Name</label>
                        <input type="text" class="form-control" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               autocomplete="name">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                             th:text="#{user.name.is.mandatory}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{object.user.email}">Email</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               autocomplete="email">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                             th:text="#{user.email.is.correctly}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{object.user.password}">Password</label>
                        <input type="password" class="form-control" th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                               autocomplete="new-password">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                             th:text="#{user.password.is.correctly}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{object.client.card}">Card Number</label>
                        <input type="text" class="form-control font-monospace" th:field="*{card}"
                               th:classappend="${#fields.hasErrors('card')} ? 'is-invalid'"
                               placeholder="e.g. 1234-5678">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('card')}"
                             th:text="#{user.card.error}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" th:text="#{object.user.phone}">Phone</label>
                        <input type="tel" class="form-control" th:field="*{phone}"
                               th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                               th:placeholder="#{profile.phone.placeholder}"
                               autocomplete="tel">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                             th:text="#{user.phone.error}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" th:text="#{object.user.dob}">Date of Birth</label>
                        <input type="date" class="form-control" th:field="*{dateOfBirth}"
                               th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('dateOfBirth')}"
                             th:text="#{user.dob.error}"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-person-check me-1"></i>
                        <span th:text="#{register.submit}">Create Account</span>
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center mt-3 text-muted small">
            <span th:text="#{register.have.account}">Already have an account?</span>
            <a th:href="@{/login}" th:text="#{register.login.link}">Sign in here</a>
        </p>

    </div>
</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
