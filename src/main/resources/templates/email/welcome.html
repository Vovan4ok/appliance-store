<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background:#f4f4f5;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
       style="background:#f4f4f5;padding:24px 0;font-family:Arial,Helvetica,sans-serif;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:8px;overflow:hidden;">
                <tr>
                    <td th:replace="~{email/fragments :: header}"></td>
                </tr>
                <tr>
                    <td style="padding:32px;color:#333333;font-size:15px;line-height:1.6;">
                        <h2 style="margin-top:0;color:#0d6efd;">
                            Welcome aboard, <span th:text="${name}">Friend</span>!
                        </h2>
                        <p>
                            Thanks for creating an account at Appliance Store. Your account is
                            ready to use.
                        </p>
                        <p>
                            You can now browse our catalogue, add appliances to your cart, and
                            place orders for review by our team.
                        </p>
                        <p style="margin-bottom:0;">Happy shopping!</p>
                    </td>
                </tr>
                <tr>
                    <td th:replace="~{email/fragments :: footer}"></td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
