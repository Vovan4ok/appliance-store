<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{profile.header}">My Profile</title>
    <style>
        .avatar-circle {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #dee2e6;
        }
        .avatar-placeholder {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: #adb5bd;
            border: 3px solid #dee2e6;
            margin: 0 auto;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <h1 class="h2 mb-4" th:text="#{profile.header}">My Profile</h1>

    <div th:if="${param.updated}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="#{profile.updated}">Profile updated successfully.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.passwordChanged}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="#{profile.password.changed}">Password changed successfully.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.avatarUpdated}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="#{profile.avatar.updated}">Avatar updated successfully.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.avatarError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-x-circle-fill me-2"></i>
        <span th:text="#{profile.avatar.error}">Invalid file. Please upload a JPEG or PNG image under 2 MB.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Avatar column -->
        <div class="col-lg-3 col-md-4">
            <div class="card shadow-sm border-0 text-center p-4">
                <div class="mb-3 d-flex justify-content-center">
                    <img th:if="${user.avatarPath != null}"
                         th:src="@{/uploads/__${user.avatarPath}__}"
                         class="avatar-circle" alt="avatar">
                    <div th:unless="${user.avatarPath != null}" class="avatar-placeholder">
                        <i class="bi bi-person-fill"></i>
                    </div>
                </div>
                <p class="fw-semibold mb-0 text-truncate" th:text="${user.name}"></p>
                <p class="text-muted small mb-3" th:text="${user.email}"></p>

                <form th:action="@{/profile/avatar}" method="post" enctype="multipart/form-data" novalidate>
                    <div class="mb-2">
                        <input type="file" name="avatar" accept="image/jpeg,image/png"
                               class="form-control form-control-sm">
                        <div class="form-text" th:text="#{profile.avatar.hint}">JPEG or PNG, max 2 MB</div>
                    </div>
                    <button type="submit" class="btn btn-outline-primary btn-sm w-100">
                        <i class="bi bi-upload me-1"></i>
                        <span th:text="#{profile.avatar.upload}">Upload Avatar</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Forms column -->
        <div class="col-lg-9 col-md-8">

            <!-- Edit profile card -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-light fw-semibold">
                    <i class="bi bi-person-lines-fill me-1"></i>
                    <span th:text="#{profile.edit.header}">Edit Profile</span>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/edit}" method="post" th:object="${profile}" novalidate>
                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" th:text="#{object.user.name}">Name</label>
                                <input type="text" th:field="*{name}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{name}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" th:text="#{object.user.email}">Email</label>
                                <input type="email" class="form-control" th:value="${user.email}" disabled>
                                <div class="form-text" th:text="#{profile.email.readonly}">Email cannot be changed.</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" th:text="#{object.user.phone}">Phone</label>
                                <input type="tel" th:field="*{phone}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                       th:placeholder="#{profile.phone.placeholder}">
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" th:text="#{object.user.dob}">Date of Birth</label>
                                <input type="date" th:field="*{dateOfBirth}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{dateOfBirth}"></div>
                            </div>

                            <div class="col-md-6" th:unless="${isEmployee}">
                                <label class="form-label fw-semibold" th:text="#{object.client.card}">Card Number</label>
                                <input type="text" th:field="*{card}" class="form-control">
                            </div>

                            <div class="col-md-6" th:if="${isEmployee}">
                                <label class="form-label fw-semibold" th:text="#{object.employee.department}">Department</label>
                                <input type="text" th:field="*{department}" class="form-control">
                            </div>

                        </div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check2 me-1"></i>
                                <span th:text="#{btn.save}">Save</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Change password card -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light fw-semibold">
                    <i class="bi bi-shield-lock me-1"></i>
                    <span th:text="#{profile.password.header}">Change Password</span>
                </div>
                <div class="card-body">

                    <div th:if="${wrongPassword}" class="alert alert-danger py-2">
                        <i class="bi bi-x-circle me-1"></i>
                        <span th:text="#{profile.password.wrong}">Current password is incorrect.</span>
                    </div>
                    <div th:if="${passwordMismatch}" class="alert alert-danger py-2">
                        <i class="bi bi-x-circle me-1"></i>
                        <span th:text="#{profile.password.mismatch}">New passwords do not match.</span>
                    </div>

                    <form th:action="@{/profile/change-password}" method="post" th:object="${passwordForm}" novalidate>
                        <div class="row g-3">

                            <div class="col-md-12">
                                <label class="form-label fw-semibold" th:text="#{profile.password.old}">Current Password</label>
                                <input type="password" th:field="*{oldPassword}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('oldPassword')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{oldPassword}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" th:text="#{profile.password.new}">New Password</label>
                                <input type="password" th:field="*{newPassword}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{newPassword}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold" th:text="#{profile.password.confirm}">Confirm New Password</label>
                                <input type="password" th:field="*{confirmPassword}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                            </div>

                        </div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-key me-1"></i>
                                <span th:text="#{profile.password.btn}">Change Password</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
