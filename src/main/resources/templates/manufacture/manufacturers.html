<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{manufacturer.header.list}">Manufacturers</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0" th:text="#{manufacturer.header.list}">Manufacturers List</h1>
        <a th:href="@{/manufacturers/add}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>
            <span th:text="#{manufacturer.btn.new}">New Manufacturer</span>
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th th:text="#{object.manufacturer.id}">ID</th>
                    <th th:text="#{object.manufacturer.name}">Name</th>
                    <th class="d-none d-md-table-cell" th:text="#{object.manufacturer.country}">Country</th>
                    <th class="d-none d-lg-table-cell" th:text="#{object.manufacturer.foundedYear}">Founded</th>
                    <th th:text="#{table.col.operations}">Operations</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="manufacturer: ${manufacturers}">
                    <td class="text-muted small" th:text="${manufacturer.id}"></td>
                    <td class="fw-semibold">
                        <img th:if="${manufacturer.logoPath}"
                             th:src="@{/uploads/__${manufacturer.logoPath}__}"
                             class="me-2 rounded" style="height:24px; width:24px; object-fit:contain;"
                             alt="">
                        <i th:unless="${manufacturer.logoPath}" class="bi bi-building text-secondary me-1"></i>
                        <span th:text="${manufacturer.name}"></span>
                    </td>
                    <td class="d-none d-md-table-cell text-muted" th:text="${manufacturer.country}"></td>
                    <td class="d-none d-lg-table-cell text-muted" th:text="${manufacturer.foundedYear}"></td>
                    <td>
                        <a th:href="@{/manufacturers/__${manufacturer.id}__/delete}"
                           class="btn btn-sm btn-outline-danger"
                           th:title="#{btn.delete}"
                           onclick="return confirm('Delete this manufacturer?')">
                            <i class="bi bi-trash"></i>
                        </a>
                        <a th:href="@{/manufacturers/__${manufacturer.id}__/edit}"
                           class="btn btn-sm btn-outline-primary"
                           th:title="#{btn.edit}">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(manufacturers)}">
                    <td colspan="5" class="text-center text-muted py-4">
                        <i class="bi bi-inbox me-1"></i>
                        <span th:text="#{table.empty}">No records found</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/manufacturers(page=${currentPage - 1})}">&#8592;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/manufacturers(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/manufacturers(page=${currentPage + 1})}">&#8594;</a>
            </li>
        </ul>
    </nav>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
