<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{manufacturer.header.list}">Manufacturers</title>
    <style>
        .manufacturer-card {
            transition: box-shadow .2s ease, transform .2s ease;
            border: 1px solid #e9ecef;
        }
        .manufacturer-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,.1) !important;
            transform: translateY(-2px);
        }
        .manufacturer-card { cursor: pointer; }
        .brand-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .description-text {
            font-size: 0.82rem;
            color: #6c757d;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 3.6em;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0" th:text="#{manufacturer.header.list}">Manufacturers</h1>
        <a sec:authorize="hasRole('EMPLOYEE')"
           th:href="@{/manufacturers/add}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>
            <span th:text="#{manufacturer.btn.new}">New Manufacturer</span>
        </a>
    </div>

    <form th:action="@{/manufacturers}" method="get" class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-md-8">
                    <label class="form-label small fw-semibold mb-1"
                           th:text="#{shop.filter.name}">Search by name</label>
                    <input type="text" name="search" class="form-control form-control-sm"
                           th:value="${filterSearch}"
                           th:placeholder="#{manufacturer.search.placeholder}">
                </div>
                <div class="col-12 col-md-auto d-flex gap-2 mt-1">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-funnel me-1"></i>
                        <span th:text="#{shop.filter.apply}">Apply</span>
                    </button>
                    <a th:href="@{/manufacturers}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-x-circle me-1"></i>
                        <span th:text="#{shop.filter.reset}">Reset</span>
                    </a>
                </div>
            </div>
        </div>
    </form>

    <div th:if="${not #lists.isEmpty(manufacturers)}"
         class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="manufacturer : ${manufacturers}">
            <div class="card h-100 manufacturer-card shadow-sm border-0"
                 th:onclick="|window.location.href='@{/manufacturers/{id}(id=${manufacturer.id})}'|">

                <div class="card-header bg-white border-bottom text-center py-3">
                    <img th:if="${manufacturer.logoPath}"
                         th:src="@{/uploads/__${manufacturer.logoPath}__}"
                         class="brand-logo" th:alt="${manufacturer.name}">
                    <i th:unless="${manufacturer.logoPath}"
                       class="bi bi-building display-3 text-secondary"></i>
                </div>

                <div class="card-body d-flex flex-column p-3">
                    <h5 class="card-title fw-bold mb-1" th:text="${manufacturer.name}">Name</h5>

                    <p class="text-muted small mb-2">
                        <i class="bi bi-geo-alt me-1"></i>
                        <span th:text="${manufacturer.country != null ? manufacturer.country : '—'}"></span>
                        <span th:if="${manufacturer.foundedYear != null}">
                            &nbsp;&middot;&nbsp;
                            <span th:text="#{manufacturer.card.founded}">Est.</span>
                            <span th:text="${manufacturer.foundedYear}"></span>
                        </span>
                    </p>

                    <p class="description-text flex-grow-1 mb-0"
                       th:text="${manufacturer.description}">—</p>
                </div>

            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(manufacturers)}" class="text-center py-5">
        <i class="bi bi-search display-1 text-muted"></i>
        <p class="text-muted mt-3 fs-5" th:text="#{manufacturer.filter.empty}">
            No manufacturers match your search
        </p>
        <a th:href="@{/manufacturers}" class="btn btn-outline-secondary mt-2">
            <i class="bi bi-x-circle me-1"></i>
            <span th:text="#{shop.filter.reset}">Reset</span>
        </a>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/manufacturers(page=${currentPage - 1}, search=${filterSearch})}">&#8592;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/manufacturers(page=${i}, search=${filterSearch})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/manufacturers(page=${currentPage + 1}, search=${filterSearch})}">&#8594;</a>
            </li>
        </ul>
    </nav>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
