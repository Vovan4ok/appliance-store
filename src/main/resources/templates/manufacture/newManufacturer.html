<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{manufacturer.btn.new}">New Manufacturer</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/manufacturers}" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h1 class="h2 mb-0" th:text="#{manufacturer.btn.new}">New Manufacturer</h1>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <form th:action="@{add-manufacturer}" th:object="${manufacturer}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-semibold" th:text="#{object.manufacturer.name}">Name</label>
                            <input type="text" class="form-control" th:field="*{name}">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check2 me-1"></i>
                                <span th:text="#{btn.create}">Create</span>
                            </button>
                            <button type="reset" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-counterclockwise me-1"></i>
                                <span th:text="#{btn.reset}">Reset</span>
                            </button>
                            <a th:href="@{/manufacturers}" class="btn btn-outline-secondary ms-auto">
                                <span th:text="#{btn.cancel}">Cancel</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
