<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="${manufacturer.name}">Manufacturer</title>
    <style>
        .brand-logo-lg {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        .detail-table th {
            font-weight: 500;
            color: #6c757d;
            width: 35%;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <a th:href="@{/manufacturers}" class="btn btn-outline-secondary btn-sm mb-4">
        <i class="bi bi-arrow-left me-1"></i>
        <span th:text="#{manufacturer.detail.back}">Back to Manufacturers</span>
    </a>

    <div class="row g-4">

        <div class="col-12 col-lg-4">
            <div class="card shadow-sm border-0 text-center p-4">

                <div class="mb-3">
                    <img th:if="${manufacturer.logoPath}"
                         th:src="@{/uploads/__${manufacturer.logoPath}__}"
                         class="brand-logo-lg" th:alt="${manufacturer.name}">
                    <i th:unless="${manufacturer.logoPath}"
                       class="bi bi-building display-1 text-secondary"></i>
                </div>

                <h2 class="h3 fw-bold mb-1" th:text="${manufacturer.name}">Name</h2>

                <p class="text-muted small mb-4">
                    <i class="bi bi-geo-alt me-1"></i>
                    <span th:text="${manufacturer.country != null ? manufacturer.country : '—'}"></span>
                    <span th:if="${manufacturer.foundedYear != null}">
                        &nbsp;&middot;&nbsp;
                        <span th:text="#{manufacturer.card.founded}">Est.</span>
                        <span th:text="${manufacturer.foundedYear}"></span>
                    </span>
                </p>

                <div class="d-grid gap-2">
                    <a th:if="${manufacturer.website != null and !manufacturer.website.isEmpty()}"
                       th:href="${manufacturer.website}"
                       target="_blank" rel="noopener noreferrer"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-globe me-1"></i>
                        <span th:text="#{manufacturer.card.website}">Visit Website</span>
                    </a>

                    <a sec:authorize="hasRole('CLIENT')"
                       th:href="@{/shop(manufacturerId=${manufacturer.id})}"
                       class="btn btn-primary">
                        <i class="bi bi-grid me-1"></i>
                        <span th:text="#{manufacturer.card.browse.appliances}">Browse Appliances</span>
                    </a>
                    <a sec:authorize="hasRole('EMPLOYEE')"
                       th:href="@{/appliances(manufacturerId=${manufacturer.id})}"
                       class="btn btn-primary">
                        <i class="bi bi-grid me-1"></i>
                        <span th:text="#{manufacturer.card.browse.appliances}">Browse Appliances</span>
                    </a>

                    <div sec:authorize="hasRole('EMPLOYEE')" class="d-flex gap-2 mt-1">
                        <a th:href="@{/manufacturers/__${manufacturer.id}__/edit}"
                           class="btn btn-outline-primary flex-grow-1">
                            <i class="bi bi-pencil me-1"></i>
                            <span th:text="#{btn.edit}">Edit</span>
                        </a>
                        <a th:href="@{/manufacturers/__${manufacturer.id}__/delete}"
                           class="btn btn-outline-danger"
                           onclick="return confirm('Delete this manufacturer?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>

            </div>
        </div>

        <div class="col-12 col-lg-8">
            <div class="card shadow-sm border-0 p-4 h-100">

                <h5 class="fw-semibold mb-3" th:text="#{object.manufacturer.description}">Description</h5>
                <p class="text-muted mb-4"
                   th:text="${manufacturer.description != null ? manufacturer.description : '—'}">
                    Description text
                </p>

                <hr class="my-3">

                <h5 class="fw-semibold mb-3">Details</h5>
                <table class="table table-sm table-borderless detail-table">
                    <tbody>
                        <tr>
                            <th th:text="#{object.manufacturer.country}">Country</th>
                            <td th:text="${manufacturer.country != null ? manufacturer.country : '—'}"></td>
                        </tr>
                        <tr>
                            <th th:text="#{object.manufacturer.foundedYear}">Founded</th>
                            <td th:text="${manufacturer.foundedYear != null ? manufacturer.foundedYear : '—'}"></td>
                        </tr>
                        <tr>
                            <th th:text="#{object.manufacturer.website}">Website</th>
                            <td>
                                <a th:if="${manufacturer.website != null and !manufacturer.website.isEmpty()}"
                                   th:href="${manufacturer.website}"
                                   target="_blank" rel="noopener noreferrer"
                                   class="text-decoration-none"
                                   th:text="${manufacturer.website}"></a>
                                <span th:unless="${manufacturer.website != null
                                        and !manufacturer.website.isEmpty()}">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
