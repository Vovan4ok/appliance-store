<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{appliance.header.list}">Appliances</title>
    <style>
        .appliance-card {
            transition: box-shadow .2s ease, transform .2s ease;
            border: 1px solid #e9ecef;
        }
        .appliance-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,.1) !important;
            transform: translateY(-2px);
        }
        .appliance-card .card-title {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .appliance-card .price-tag {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0d6efd;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid #f1f3f5;
            font-size: 0.82rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            color: #6c757d;
            font-weight: 500;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .info-value {
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 60%;
        }
        .description-text {
            font-size: 0.78rem;
            color: #6c757d;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.4em;
        }
        .badge-power-type { font-size: 0.7rem; }
        .appliance-card { position: relative; }
        .out-of-stock-card > :not(.out-of-stock-overlay) {
            filter: blur(0.5px);
            opacity: 0.8;
        }
        .out-of-stock-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }
        .out-of-stock-badge {
            background: rgba(220,53,69,0.85);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 0.3rem 1rem;
            border-radius: 6px;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0 fw-bold" th:text="#{appliance.header.list}">Appliances List</h1>
            <small class="text-muted" th:text="${#lists.size(appliances)} + ' items on this page'"></small>
        </div>
        <a th:href="@{/appliances/add}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>
            <span th:text="#{appliance.btn.new}">New Appliance</span>
        </a>
    </div>

    <form th:action="@{/appliances}" method="get" class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">

                <div class="col-12 col-md-3">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.filter.name}">Name</label>
                    <input type="text" name="name" class="form-control form-control-sm"
                           th:value="${filterName}" th:placeholder="#{shop.filter.name.placeholder}">
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{object.appliance.category}">Category</label>
                    <select name="category" class="form-select form-select-sm">
                        <option value="" th:text="#{shop.filter.any}">Any</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.name()}"
                                th:text="${cat.name()}"
                                th:selected="${filterCategory != null and filterCategory == cat}"></option>
                    </select>
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{object.appliance.powerType}">Power Type</label>
                    <select name="powerType" class="form-select form-select-sm">
                        <option value="" th:text="#{shop.filter.any}">Any</option>
                        <option th:each="pt : ${powerTypes}"
                                th:value="${pt.name()}"
                                th:text="${pt.name()}"
                                th:selected="${filterPowerType != null and filterPowerType == pt}"></option>
                    </select>
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{object.appliance.manufacturer}">Manufacturer</label>
                    <select name="manufacturerId" class="form-select form-select-sm">
                        <option value="" th:text="#{shop.filter.any}">Any</option>
                        <option th:each="m : ${manufacturers}"
                                th:value="${m.id}"
                                th:text="${m.name}"
                                th:selected="${filterManufacturerId != null and filterManufacturerId == m.id}"></option>
                    </select>
                </div>

                <div class="col-3 col-md-1">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.filter.minPrice}">Min ₴</label>
                    <input type="number" name="minPrice" min="0" step="0.01"
                           class="form-control form-control-sm"
                           th:value="${filterMinPrice}">
                </div>
                <div class="col-3 col-md-1">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.filter.maxPrice}">Max ₴</label>
                    <input type="number" name="maxPrice" min="0" step="0.01"
                           class="form-control form-control-sm"
                           th:value="${filterMaxPrice}">
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.sort.by}">Sort by</label>
                    <div class="input-group input-group-sm">
                        <select name="sortBy" class="form-select form-select-sm">
                            <option value="name"     th:selected="${sortBy == 'name'}"     th:text="#{object.appliance.name}">Name</option>
                            <option value="price"    th:selected="${sortBy == 'price'}"    th:text="#{object.appliance.price}">Price</option>
                            <option value="category" th:selected="${sortBy == 'category'}" th:text="#{object.appliance.category}">Category</option>
                            <option value="power"    th:selected="${sortBy == 'power'}"    th:text="#{object.appliance.power}">Power</option>
                        </select>
                        <select name="sortDir" class="form-select form-select-sm" style="max-width: 70px;">
                            <option value="asc"  th:selected="${sortDir == 'asc'}"  th:text="#{shop.sort.asc}">↑</option>
                            <option value="desc" th:selected="${sortDir == 'desc'}" th:text="#{shop.sort.desc}">↓</option>
                        </select>
                    </div>
                </div>

                <div class="col-12 col-md-auto d-flex align-items-end gap-3 mt-1">
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" name="outOfStockOnly" value="true" id="outOfStockOnly"
                               th:checked="${filterOutOfStockOnly}">
                        <label class="form-check-label small fw-semibold" for="outOfStockOnly"
                               th:text="#{shop.filter.out.of.stock.only}">Out of stock only</label>
                    </div>
                </div>

                <div class="col-12 col-md-auto d-flex gap-2 mt-1">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-funnel me-1"></i>
                        <span th:text="#{shop.filter.apply}">Apply</span>
                    </button>
                    <a th:href="@{/appliances}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-x-circle me-1"></i>
                        <span th:text="#{shop.filter.reset}">Reset</span>
                    </a>
                </div>

            </div>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(appliances)}"
         class="card border-0 shadow-sm text-center py-5">
        <i class="bi bi-inbox display-4 text-muted mb-3"></i>
        <p class="text-muted mb-0" th:text="#{table.empty}">No records found</p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" th:unless="${#lists.isEmpty(appliances)}">
        <div class="col"
             th:each="appliance : ${appliances}">
            <div class="h-100">
            <div class="card h-100 appliance-card shadow-sm"
                 th:classappend="${appliance.stock != null and appliance.stock == 0} ? ' out-of-stock-card'">
                <div th:if="${appliance.stock != null and appliance.stock == 0}" class="out-of-stock-overlay">
                    <span class="out-of-stock-badge" th:text="#{shop.out.of.stock}">Out of stock</span>
                </div>

                <div class="card-header bg-white border-bottom d-flex align-items-start justify-content-between gap-2 py-2">
                    <span class="card-title mb-0" th:text="${appliance.name}" th:title="${appliance.name}">Name</span>
                    <div class="d-flex flex-column align-items-end gap-1 flex-shrink-0">
                        <span class="badge"
                              th:classappend="${appliance.category.name() == 'BIG'} ? 'bg-primary' : 'bg-secondary'"
                              th:text="${appliance.category}"></span>
                        <span class="badge bg-dark badge-power-type" th:text="${appliance.powerType}"></span>
                    </div>
                </div>

                <div class="card-body d-flex flex-column p-3">

                    <p class="description-text mb-2" th:text="${appliance.description}">Description</p>

                    <div class="flex-grow-1 mb-3">
                        <div class="info-row">
                            <span class="info-label" th:text="#{object.appliance.manufacturer}">Manufacturer</span>
                            <span class="info-value fw-semibold"
                                  th:text="${appliance.manufacturerName != null ? appliance.manufacturerName : '—'}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label" th:text="#{object.appliance.model}">Model</span>
                            <span class="info-value" th:text="${appliance.model}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label" th:text="#{object.appliance.power}">Power (W)</span>
                            <span class="info-value">
                                <i class="bi bi-lightning-charge-fill text-warning" style="font-size:.75rem"></i>
                                <span th:text="${appliance.power} + ' W'"></span>
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="info-label" th:text="#{object.appliance.characteristic}">Characteristic</span>
                            <span class="info-value text-muted" th:text="${appliance.characteristic}"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label" th:text="#{object.appliance.stock}">Stock</span>
                            <span class="info-value fw-semibold text-success"
                                  th:text="${appliance.stock != null} ? ${appliance.stock} : '—'"></span>
                        </div>
                    </div>

                    <div class="d-flex align-items-center justify-content-between mt-auto pt-2 border-top">
                        <span class="price-tag" th:text="${appliance.price} + ' UAH'"></span>
                        <div class="d-flex gap-1">
                            <a th:href="@{/appliances/__${appliance.id}__/edit}"
                               class="btn btn-sm btn-outline-primary"
                               th:title="#{btn.edit}">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/appliances/__${appliance.id}__/delete}"
                               class="btn btn-sm btn-outline-danger"
                               th:title="#{btn.delete}"
                               onclick="return confirm('Delete this appliance?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
            </div>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/appliances(page=${currentPage - 1}, name=${filterName}, category=${filterCategory}, powerType=${filterPowerType}, manufacturerId=${filterManufacturerId}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice}, sortBy=${sortBy}, sortDir=${sortDir}, outOfStockOnly=${filterOutOfStockOnly})}">&#8592;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/appliances(page=${i}, name=${filterName}, category=${filterCategory}, powerType=${filterPowerType}, manufacturerId=${filterManufacturerId}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice}, sortBy=${sortBy}, sortDir=${sortDir}, outOfStockOnly=${filterOutOfStockOnly})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/appliances(page=${currentPage + 1}, name=${filterName}, category=${filterCategory}, powerType=${filterPowerType}, manufacturerId=${filterManufacturerId}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice}, sortBy=${sortBy}, sortDir=${sortDir}, outOfStockOnly=${filterOutOfStockOnly})}">&#8594;</a>
            </li>
        </ul>
    </nav>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
