<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{order.choice.header}">Add Appliance to Order</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/orders/__${ordersId}__/edit}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h1 class="h2 mb-0" th:text="#{order.choice.header}">Add Appliance to Order</h1>
                <small class="text-muted">
                    <span th:text="#{object.order.id}">Order</span> #<span th:text="${ordersId}"></span>
                </small>
            </div>
        </div>
    </div>

    <form th:action="@{/orders/__${ordersId}__/choice-appliance}" method="get" class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">

                <div class="col-12 col-md-3">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.filter.name}">Name</label>
                    <input type="text" name="name" class="form-control form-control-sm"
                           th:value="${filterName}" th:placeholder="#{shop.filter.name.placeholder}">
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{object.appliance.category}">Category</label>
                    <select name="category" class="form-select form-select-sm">
                        <option value="" th:text="#{shop.filter.any}">Any</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.name()}"
                                th:text="${cat.name()}"
                                th:selected="${filterCategory != null and filterCategory == cat}"></option>
                    </select>
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{object.appliance.powerType}">Power Type</label>
                    <select name="powerType" class="form-select form-select-sm">
                        <option value="" th:text="#{shop.filter.any}">Any</option>
                        <option th:each="pt : ${powerTypes}"
                                th:value="${pt.name()}"
                                th:text="${pt.name()}"
                                th:selected="${filterPowerType != null and filterPowerType == pt}"></option>
                    </select>
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{object.appliance.manufacturer}">Manufacturer</label>
                    <select name="manufacturerId" class="form-select form-select-sm">
                        <option value="" th:text="#{shop.filter.any}">Any</option>
                        <option th:each="m : ${manufacturers}"
                                th:value="${m.id}"
                                th:text="${m.name}"
                                th:selected="${filterManufacturerId != null and filterManufacturerId == m.id}"></option>
                    </select>
                </div>

                <div class="col-3 col-md-1">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.filter.minPrice}">Min ₴</label>
                    <input type="number" name="minPrice" min="0" step="0.01"
                           class="form-control form-control-sm"
                           th:value="${filterMinPrice}">
                </div>
                <div class="col-3 col-md-1">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.filter.maxPrice}">Max ₴</label>
                    <input type="number" name="maxPrice" min="0" step="0.01"
                           class="form-control form-control-sm"
                           th:value="${filterMaxPrice}">
                </div>

                <div class="col-6 col-md-2">
                    <label class="form-label small fw-semibold mb-1" th:text="#{shop.sort.by}">Sort by</label>
                    <div class="input-group input-group-sm">
                        <select name="sortBy" class="form-select form-select-sm">
                            <option value="name"     th:selected="${sortBy == 'name'}"     th:text="#{object.appliance.name}">Name</option>
                            <option value="price"    th:selected="${sortBy == 'price'}"    th:text="#{object.appliance.price}">Price</option>
                            <option value="category" th:selected="${sortBy == 'category'}" th:text="#{object.appliance.category}">Category</option>
                            <option value="power"    th:selected="${sortBy == 'power'}"    th:text="#{object.appliance.power}">Power</option>
                        </select>
                        <select name="sortDir" class="form-select form-select-sm" style="max-width: 70px;">
                            <option value="asc"  th:selected="${sortDir == 'asc'}"  th:text="#{shop.sort.asc}">↑</option>
                            <option value="desc" th:selected="${sortDir == 'desc'}" th:text="#{shop.sort.desc}">↓</option>
                        </select>
                    </div>
                </div>

                <div class="col-12 col-md-auto d-flex gap-2 mt-1">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-funnel me-1"></i>
                        <span th:text="#{shop.filter.apply}">Apply</span>
                    </button>
                    <a th:href="@{/orders/__${ordersId}__/choice-appliance}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-x-circle me-1"></i>
                        <span th:text="#{shop.filter.reset}">Reset</span>
                    </a>
                </div>

            </div>
        </div>
    </form>

    <div th:if="${not #lists.isEmpty(appliances)}"
         class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="appliance: ${appliances}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${appliance.name}">Appliance Name</h5>
                    <p class="text-muted small mb-1">
                        <span th:text="${appliance.manufacturer.getName()}">Brand</span>
                        &nbsp;&middot;&nbsp;
                        <span th:text="${appliance.category}">Category</span>
                    </p>
                    <p class="card-text small text-secondary flex-grow-1"
                       th:text="${appliance.characteristic}">—</p>
                    <div class="fw-bold fs-5 text-primary mb-3">
                        <span th:text="${appliance.price}">0.00</span> UAH
                    </div>

                    <form th:action="@{/orders/__${ordersId}__/add-into-order}" method="post" class="mt-auto">
                        <input type="hidden" name="applianceId" th:value="${appliance.id}">
                        <input type="hidden" name="price" th:value="${appliance.price}">
                        <div class="mb-2">
                            <label class="form-label small fw-semibold" th:text="#{shop.qty.label}">Qty</label>
                            <input type="number" name="numbers" value="1" min="1" max="999"
                                   class="form-control form-control-sm">
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-plus-circle me-1"></i>
                            <span th:text="#{order.choice.add}">Add to Order</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(appliances)}" class="text-center py-5">
        <i class="bi bi-search display-1 text-muted"></i>
        <p class="text-muted mt-3 fs-5" th:text="#{shop.filter.empty}">No appliances match your filters</p>
        <a th:href="@{/orders/__${ordersId}__/choice-appliance}" class="btn btn-outline-secondary mt-2">
            <i class="bi bi-x-circle me-1"></i>
            <span th:text="#{shop.filter.reset}">Reset filters</span>
        </a>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/orders/__${ordersId}__/choice-appliance(page=${currentPage - 1}, name=${filterName}, category=${filterCategory}, powerType=${filterPowerType}, manufacturerId=${filterManufacturerId}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice}, sortBy=${sortBy}, sortDir=${sortDir})}">&#8592;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/orders/__${ordersId}__/choice-appliance(page=${i}, name=${filterName}, category=${filterCategory}, powerType=${filterPowerType}, manufacturerId=${filterManufacturerId}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice}, sortBy=${sortBy}, sortDir=${sortDir})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/orders/__${ordersId}__/choice-appliance(page=${currentPage + 1}, name=${filterName}, category=${filterCategory}, powerType=${filterPowerType}, manufacturerId=${filterManufacturerId}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice}, sortBy=${sortBy}, sortDir=${sortDir})}">&#8594;</a>
            </li>
        </ul>
    </nav>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
