<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{client.btn.new}">New Client</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/clients}" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h1 class="h2 mb-0" th:text="#{client.btn.new}">New Client</h1>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <form th:action="@{add-client}" th:object="${client}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold" th:text="#{object.user.name}">Name</label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                                 th:text="#{user.name.is.mandatory}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" th:text="#{object.user.email}">Email</label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                 th:text="#{user.email.is.correctly}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" th:text="#{object.user.password}">Password</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                 th:text="#{user.password.is.correctly}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" th:text="#{object.client.card}">Card Number</label>
                            <input type="text" class="form-control font-monospace" th:field="*{card}"
                                   th:classappend="${#fields.hasErrors('card')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('card')}" th:text="#{user.card.error}">Invalid card number</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" th:text="#{object.user.phone}">Phone</label>
                            <input type="tel" class="form-control" th:field="*{phone}"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                   th:placeholder="#{profile.phone.placeholder}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:text="#{user.phone.error}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold" th:text="#{object.user.dob}">Date of Birth</label>
                            <input type="date" class="form-control" th:field="*{dateOfBirth}"
                                   th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('dateOfBirth')}" th:text="#{user.dob.error}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check2 me-1"></i>
                                <span th:text="#{btn.create}">Create</span>
                            </button>
                            <button type="reset" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-counterclockwise me-1"></i>
                                <span th:text="#{btn.reset}">Reset</span>
                            </button>
                            <a th:href="@{/clients}" class="btn btn-outline-secondary ms-auto">
                                <span th:text="#{btn.cancel}">Cancel</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
