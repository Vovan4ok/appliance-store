<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{client.header.list}">Clients</title>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0" th:text="#{client.header.list}">Clients List</h1>
        <a th:href="@{/clients/add}" class="btn btn-primary">
            <i class="bi bi-person-plus me-1"></i>
            <span th:text="#{client.btn.new}">New Client</span>
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="d-none d-md-table-cell" th:text="#{object.user.id}">ID</th>
                    <th th:text="#{object.user.name}">Name</th>
                    <th th:text="#{object.user.email}">Email</th>
                    <th class="d-none d-lg-table-cell" th:text="#{object.client.card}">Card</th>
                    <th class="d-none d-xl-table-cell" th:text="#{object.user.phone}">Phone</th>
                    <th class="d-none d-xl-table-cell" th:text="#{object.user.dob}">Date of Birth</th>
                    <th th:text="#{table.col.operations}">Operations</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="client: ${clients}">
                    <td class="d-none d-md-table-cell text-muted small" th:text="${client.id}"></td>
                    <td class="fw-semibold">
                        <i class="bi bi-person-circle text-secondary me-1"></i>
                        <span th:text="${client.name}"></span>
                    </td>
                    <td class="text-muted" th:text="${client.email}"></td>
                    <td class="d-none d-lg-table-cell">
                        <span class="font-monospace small" th:text="${client.card}"></span>
                    </td>
                    <td class="d-none d-xl-table-cell text-muted small" th:text="${client.phone != null} ? ${client.phone} : '—'"></td>
                    <td class="d-none d-xl-table-cell text-muted small" th:text="${client.dateOfBirth != null} ? ${#temporals.format(client.dateOfBirth, 'dd.MM.yyyy')} : '—'"></td>
                    <td>
                        <a th:href="@{/clients/__${client.id}__/delete}"
                           class="btn btn-sm btn-outline-danger"
                           th:title="#{btn.delete}"
                           onclick="return confirm('Delete this client?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(clients)}">
                    <td colspan="7" class="text-center text-muted py-4">
                        <i class="bi bi-inbox me-1"></i>
                        <span th:text="#{table.empty}">No records found</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/clients(page=${currentPage - 1})}">&#8592;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/clients(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/clients(page=${currentPage + 1})}">&#8594;</a>
            </li>
        </ul>
    </nav>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
