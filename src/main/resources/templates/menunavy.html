<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navy" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}" th:text="#{shop.name}">Appliance Store</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/clients}" th:text="#{clients.menu.name}">Clients</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/employees}" th:text="#{employees.menu.name}">Employees</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/manufacturers}" th:text="#{manufacturers.menu.name}">Manufacturers</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/appliances}" th:text="#{appliances.menu.name}">Appliances</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/orders}" th:text="#{order.menu.name}">Orders</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/shop}" th:text="#{nav.shop}">Shop</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/shop/cart}" th:text="#{nav.cart}">
                        <i class="bi bi-cart3"></i> Cart
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/orders}" th:text="#{nav.my.orders}">My Orders</a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-3">
                <div class="d-flex gap-1">
                    <a th:href="@{__${currentUri}__(lang=en)}" class="btn btn-outline-light btn-sm">EN</a>
                    <a th:href="@{__${currentUri}__(lang=uk)}" class="btn btn-outline-light btn-sm">UA</a>
                </div>
                <div class="d-flex align-items-center gap-2" sec:authorize="isAuthenticated()">
                    <span class="text-light small">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name"></span>
                    </span>
                    <form th:action="@{/auth/logout}" method="post" class="d-inline m-0">
                        <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{nav.logout}">
                            Logout
                        </button>
                    </form>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/login}">Login</a>
                </div>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
