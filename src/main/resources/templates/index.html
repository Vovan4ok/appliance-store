<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title th:text="#{shop.name}">Appliance Store</title>
    <style>
        .nav-card {
            transition: box-shadow .2s ease, transform .2s ease;
        }
        .nav-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,.12) !important;
            transform: translateY(-3px);
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
<header>
    <div th:insert="~{menunavy::navy}"></div>
</header>
<main class="container my-5 flex-grow-1">

    <div class="text-center mb-5">
        <i class="bi bi-lightning-charge-fill display-1 text-warning"></i>
        <h1 class="mt-3 fw-bold" th:text="#{shop.name}">Appliance Store</h1>
        <p class="text-muted lead" th:text="#{index.subtitle}">Your one-stop shop for home appliances</p>
    </div>

    <div sec:authorize="hasRole('CLIENT')" class="row g-4 justify-content-center">
        <div class="col-sm-6 col-md-4">
            <a th:href="@{/shop}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-4 nav-card">
                    <i class="bi bi-shop display-4 text-primary mb-3"></i>
                    <h5 class="card-title" th:text="#{nav.shop}">Shop</h5>
                    <p class="card-text text-muted small" th:text="#{index.client.shop.desc}">Browse our appliance catalog</p>
                </div>
            </a>
        </div>
        <div class="col-sm-6 col-md-4">
            <a th:href="@{/shop/cart}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-4 nav-card">
                    <i class="bi bi-cart3 display-4 text-success mb-3"></i>
                    <h5 class="card-title" th:text="#{nav.cart}">Cart</h5>
                    <p class="card-text text-muted small" th:text="#{index.client.cart.desc}">View your shopping cart</p>
                </div>
            </a>
        </div>
        <div class="col-sm-6 col-md-4">
            <a th:href="@{/orders}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-4 nav-card">
                    <i class="bi bi-receipt display-4 text-info mb-3"></i>
                    <h5 class="card-title" th:text="#{nav.my.orders}">My Orders</h5>
                    <p class="card-text text-muted small" th:text="#{index.client.orders.desc}">Track your orders</p>
                </div>
            </a>
        </div>
    </div>

    <div sec:authorize="hasRole('EMPLOYEE')" class="row g-3 justify-content-center">
        <div class="col-6 col-md-4 col-lg-2">
            <a th:href="@{/appliances}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-3 nav-card">
                    <i class="bi bi-plug display-5 text-primary mb-2"></i>
                    <h6 class="card-title mb-0" th:text="#{appliances.menu.name}">Appliances</h6>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <a th:href="@{/clients}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-3 nav-card">
                    <i class="bi bi-people display-5 text-success mb-2"></i>
                    <h6 class="card-title mb-0" th:text="#{clients.menu.name}">Clients</h6>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <a th:href="@{/employees}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-3 nav-card">
                    <i class="bi bi-person-badge display-5 text-warning mb-2"></i>
                    <h6 class="card-title mb-0" th:text="#{employees.menu.name}">Employees</h6>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <a th:href="@{/manufacturers}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-3 nav-card">
                    <i class="bi bi-building display-5 text-info mb-2"></i>
                    <h6 class="card-title mb-0" th:text="#{manufacturers.menu.name}">Manufacturers</h6>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <a th:href="@{/orders}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 text-center p-3 nav-card">
                    <i class="bi bi-clipboard-check display-5 text-danger mb-2"></i>
                    <h6 class="card-title mb-0" th:text="#{order.menu.name}">Orders</h6>
                </div>
            </a>
        </div>
    </div>

    <div sec:authorize="!isAuthenticated()" class="text-center mt-4">
        <a th:href="@{/login}" class="btn btn-primary btn-lg px-5">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            <span th:text="#{index.signin}">Sign In</span>
        </a>
    </div>

</main>
<div th:insert="~{footer::footer}"></div>
</body>
</html>
